[pytest]
testpaths = tests/python
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = baseball
branch = true
omit = 
    */tests/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
fail_under = 80
show_missing = true

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml