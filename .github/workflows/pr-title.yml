name: PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

jobs:
  semantic-pr:
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            test
            refactor
            ci
          requireScope: false
