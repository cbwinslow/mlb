name: "CI — Orchestrator"

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "hotfix/**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable tmate debug session"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

defaults:
  run:
    shell: bash

jobs:
  should-run:
    name: "Gate: Skip Draft PRs"
    runs-on: [self-hosted, homelab, linux]
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

  lint:
    name: "Lint & Format"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  security-scan:
    name: "Security Scan"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/security.yml
    secrets: inherit

  test:
    name: "Test Suite"
    needs: [lint]
    uses: ./.github/workflows/tests.yml
    secrets: inherit
    with:
      python-version: "3.12"
      coverage-threshold: 80

  build-check:
    name: "Build Validation"
    needs: [test]
    runs-on: [self-hosted, homelab, linux]
    steps:
      - uses: actions/checkout@v4
      - name: Validate all Python ASTs
        run: |
          python3 -c "\
import ast, sys, pathlib\n\
errors = []\n\
for f in pathlib.Path('.').rglob('*.py'):\n\
    if '.git' in str(f): continue\n\
    try:\n\
        ast.parse(f.read_text())\n\
    except SyntaxError as e:\n\
        errors.append(f'{f}: {e}')\n\
if errors:\n\
    print('\n'.join(errors)); sys.exit(1)\n\
print(f'All Python files parse cleanly: {sum(1 for _ in pathlib.Path(".").rglob("*.py"))} files checked')"

  debug:
    name: "Debug Session (manual)"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.debug == 'true'
    runs-on: [self-hosted, homelab, linux]
    steps:
      - uses: actions/checkout@v4
      - uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
    timeout-minutes: 30

  ci-summary:
    name: "CI Summary"
    if: always()
    needs: [lint, security-scan, test, build-check]
    runs-on: [self-hosted, homelab, linux]
    steps:
      - name: Write summary
        run: |
          echo "## CI Results — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
