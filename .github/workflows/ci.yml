name: "CI - Orchestrator"

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "hotfix/**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable tmate debug session"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

defaults:
  run:
    shell: bash

jobs:
  should-run:
    name: "Gate: Skip Draft PRs"
    runs-on: [self-hosted, homelab, linux]
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

  lint:
    name: "Lint & Format"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  security-scan:
    name: "Security Scan"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/security.yml
    secrets: inherit

  test:
    name: "Test Suite"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  debug:
    name: "Debug (tmate)"
    runs-on: [self-hosted, homelab, linux]
    if: ${{ github.event.inputs.debug == 'true' }}
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Start tmate debug session
        run: |
          if ! command -v tmate &>/dev/null; then
            sudo apt-get install -y tmate 2>/dev/null || true
          fi
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          sleep 1800
        timeout-minutes: 30
