name: "CI - Orchestrator"

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

defaults:
  run:
    shell: bash

env:
  PYTHONUNBUFFERED: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  lint:
    name: "Lint & Format"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install linters
        run: pip install ruff black isort mypy -q

      - name: ruff (fast linter)
        run: ruff check . --output-format=github 2>&1 || true

      - name: black (format check)
        run: black --check --diff . 2>&1 || true

      - name: isort (import order)
        run: isort --check-only --diff . 2>&1 || true

      - name: mypy (type check)
        run: mypy baseball/ --ignore-missing-imports --show-error-codes 2>&1 || true

  test:
    name: "Test Suite"
    needs: lint
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Set up Python
        run: |
          python3 --version
          python3 -m pip install --upgrade pip --quiet

      - name: Install package and test dependencies
        run: |
          python3 -m pip install . --quiet
          python3 -m pip install pytest pytest-cov pytest-xdist -q

      - name: Run pytest with coverage
        run: |
          python3 -m pytest tests/python/ \
            --cov=baseball \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=80 \
            -n auto || true

      - name: Upload coverage to Codecov
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            bash <(curl -s https://codecov.io/bash) -f coverage.xml -t ${{ secrets.CODECOV_TOKEN }} || true
          fi

  security:
    name: "Security Scan"
    needs: lint
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install security tools
        run: pip install bandit safety -q

      - name: Run bandit (SAST)
        run: bandit -r baseball/ -f txt --severity-level medium -x tests/ 2>&1 || true

      - name: Run safety (dependency check)
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt 2>&1 || true
          fi

  sonarcloud:
    name: "SonarCloud Analysis"
    needs: test
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Set up Python
        run: python3 -m pip install --upgrade pip --quiet

      - name: Install dependencies
        run: python3 -m pip install . sonar-scanner -q

      - name: Run SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=cbwinslow_mlb \
            -Dsonar.organization=cbwinslow \
            -Dsonar.sources=baseball \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=$SONAR_TOKEN || true

  snyk:
    name: "Snyk Security"
    needs: test
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Run Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          pip install snyk -q
          snyk test --all-projects || true

  build-check:
    name: "Build Validation"
    needs: [test, security, sonarcloud, snyk]
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Validate all Python ASTs
        run: |
          python3 <<'PY'
          import ast, sys, pathlib

          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              if '.git' in str(f):
                  continue
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')

          if errors:
              print('\n'.join(errors))
              sys.exit(1)

          print(f'All Python files parse cleanly: {sum(1 for _ in pathlib.Path(".").rglob("*.py"))} files checked')
          PY
  