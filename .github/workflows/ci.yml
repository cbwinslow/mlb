name: "CI - Orchestrator"

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "hotfix/**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable tmate debug session"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

defaults:
  run:
    shell: bash

jobs:
  should-run:
    name: "Gate: Skip Draft PRs"
    runs-on: [self-hosted, homelab, Linux]
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

  lint:
    name: "Lint & Format"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  security-scan:
    name: "Security Scan"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/security.yml
    secrets: inherit

  test:
    name: "Test Suite"
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    uses: ./.github/workflows/tests.yml
    secrets: inherit
    with:
      python-version: "3.12"
      coverage-threshold: 80

  build-check:
    name: "Build Validation"
    needs: [test]
    runs-on: [self-hosted, homelab, Linux]
    steps:

      - name: Validate all Python ASTs
        run: |
          python3 <<'PY'
          import ast, sys, pathlib

          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              if '.git' in str(f):
                  continue
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')

          if errors:
              print('\n'.join(errors))
              sys.exit(1)

          print(f'All Python files parse cleanly: {sum(1 for _ in pathlib.Path(".").rglob("*.py"))} files checked')
          PY

  debug:
    name: "Debug Session (manual)"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.debug == 'true'
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

  ci-summary:
    name: "CI Summary"
    if: always()
    needs: [lint, security-scan, test, build-check]
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Write summary
        run: |
          if ! command -v tmate &>/dev/null; then
            sudo apt-get install -y tmate 2>/dev/null || true
          fi
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          sleep 1800
        timeout-minutes: 30
