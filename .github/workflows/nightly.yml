name: "Nightly — Scheduled Jobs"

on:
  schedule:
    - cron: "0 5 * * *"  # 5am UTC every day
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  nightly-tests:
    name: "Nightly Full Test Suite"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Set up Python
        run: |
          python3 --version
          python3 -m pip install --upgrade pip --quiet

      - name: Install package and test dependencies
        run: |
          python3 -m pip install . --quiet
          python3 -m pip install pytest pytest-cov -q

      - name: Run pytest
        run: |
          python3 -m pytest tests/python/ \
            --cov=baseball \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=70 || true

  db-health:
    name: "Database Health Check"
    runs-on: [self-hosted, homelab, Linux]
    env:
      MLB_DB_DSN: ${{ secrets.MLB_DB_DSN }}
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install psycopg2
        run: pip install psycopg2-binary -q

      - name: Run database health checks
        run: |
          if [ -z "$MLB_DB_DSN" ]; then
            echo "MLB_DB_DSN secret not set, skipping DB health check"
            exit 0
          fi
          python3 << 'PYEOF'
          import os, psycopg2, sys
          conn = psycopg2.connect(os.environ['MLB_DB_DSN'], connect_timeout=10)
          cur = conn.cursor()
          results = []

          checks = [
              ("Orphaned pitches", "SELECT COUNT(*) FROM stg.fn_detect_orphaned_pitches() AS t"),
              ("Enrichment queue", "SELECT COUNT(*) FROM stg.v_players_pending_enrichment"),
              ("Unresolved > 48h", "SELECT COUNT(*) FROM stg.player_identity WHERE resolved_at IS NULL AND created_at < NOW() - INTERVAL '48 hours'"),
              ("Chadwick unmatched", "SELECT COUNT(*) FROM stg.v_chadwick_unmatched"),
          ]

          any_failure = False
          for label, query in checks:
              try:
                  cur.execute(query)
                  val = cur.fetchone()[0]
                  status = "OK" if val == 0 else f"WARNING: {val} items"
                  results.append((label, val, status))
                  if val > 100:
                      any_failure = True
              except Exception as e:
                  results.append((label, "ERROR", str(e)))

          conn.close()
          print("\nDB Health Report:")
          for label, val, status in results:
              print(f"  {label}: {val} ({status})")

          if any_failure:
              print("\nWARNING: Health check thresholds exceeded")
          PYEOF

  enrichment-dry-run:
    name: "Enrichment Pipeline Dry-Run"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Set up Python
        run: |
          python3 --version
          python3 -m pip install --upgrade pip --quiet

      - name: Install package
        run: python3 -m pip install . --quiet

      - name: Dry-run enrichment
        run: |
          if [ -f baseball/ingestion/enrich_player_identity.py ]; then
            python baseball/ingestion/enrich_player_identity.py \
              --dry-run \
              --batch-size 50 \
              --no-reconcile \
              --log-level INFO || true
          else
            echo "enrich_player_identity.py not found, skipping"
          fi
                title: `\uD83D\uDEA8 Nightly CI Failure \u2014 ${date}`,
                body: `## Nightly CI failed\n\nOne or more nightly jobs failed on ${date}.\n\n**Run:** ${runUrl}\n\n**Jobs:**\n- Tests: ${{ needs.nightly-tests.result }}\n- DB Health: ${{ needs.db-health.result }}\n- Dry-Run: ${{ needs.enrichment-dry-run.result }}\n\nPlease investigate and close this issue once resolved.`,
                labels: ['bug', 'ci-failure', 'automated', 'nightly'],
              });
            }
