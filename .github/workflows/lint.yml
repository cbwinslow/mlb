name: "Lint & Format Check"

on:
  workflow_call:
  pull_request:
    paths: ["**.py", "**.sql", "**.yml", "pyproject.toml", ".pre-commit-config.yaml"]
  push:
    branches: [main, develop]
    paths: ["**.py", "**.sql"]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  python-lint:
    name: "ruff + black + isort + mypy"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Cache pip
        run: |
          export PIP_CACHE_DIR=~/.cache/pip
          mkdir -p "$PIP_CACHE_DIR"

      - name: Install linters
        run: pip install ruff black isort mypy types-psycopg2 types-requests -q

      - name: ruff (fast linter)
        run: ruff check . --output-format=github 2>&1 || true

      - name: black (format check)
        run: black --check --diff . 2>&1 || true

      - name: isort (import order)
        run: isort --check-only --diff . 2>&1 || true

      - name: mypy (type check)
        run: |
          if [ -d scripts ]; then
            mypy scripts/ --ignore-missing-imports --show-error-codes --pretty 2>&1 || true
          fi

      - name: Write lint summary
        if: always()
        run: |
          echo "## Lint Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ruff | checked |" >> "$GITHUB_STEP_SUMMARY"
          echo "| black | checked |" >> "$GITHUB_STEP_SUMMARY"
          echo "| isort | checked |" >> "$GITHUB_STEP_SUMMARY"
          echo "| mypy | checked |" >> "$GITHUB_STEP_SUMMARY"

  sql-lint:
    name: "sqlfluff (postgres dialect)"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install sqlfluff
        run: pip install sqlfluff -q

      - name: sqlfluff lint
        run: |
          if [ -d sql ]; then
            sqlfluff lint sql/ \
              --dialect postgres \
              --format github-annotation \
              --annotation-level warning \
              --exclude-rules ST06,ST07 2>&1 || true
          else
            echo "No sql/ directory found, skipping"
          fi

  yaml-lint:
    name: "yamllint"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install yamllint
        run: pip install yamllint -q

      - name: Run yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, truthy: {allowed-values: ["true", "false", "on", "off"]}}}' .github/workflows/ 2>&1 || true

  pre-commit:
    name: "Pre-commit hooks"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Run pre-commit (if config exists)
        run: |
          if [ -f .pre-commit-config.yaml ]; then
            pip install pre-commit -q
            pre-commit run --all-files 2>&1 || true
          else
            echo "No .pre-commit-config.yaml found, skipping"
          fi
