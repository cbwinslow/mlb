name: Auto-Fix via Gemini CLI (free)

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autofix:
    name: Gemini CLI auto-fix on ai-fix label
    runs-on: ubuntu-latest
    if: |
      (contains(github.event.issue.labels.*.name, 'ai-fix') ||
       contains(github.event.issue.labels.*.name, 'auto-review')) &&
      github.event.issue.user.type != 'Bot'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch_depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project
        run: pip install -e . 2>/dev/null || true

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini auto-fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          gemini -p "Fix issue #${ISSUE_NUMBER}: ${ISSUE_TITLE} in the mlb repo. Use the most capable Gemini/model available. Rules: no secrets, no raw DATABASE_URL in logs, workspace_id required on multi-tenant inserts, catch specific exceptions only, minimal surgical change only. Edit the relevant files and stop after the fix." \\\
            -yolo 2>&1 | tee /tmp/gemini_output.txt

      - name: Open draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --staged --quiet; then
            gh issue comment ${{ github.event.issue.number }} --body "Gemini reviewed but no changes needed."
            exit 0
          fi
          BRANCH="auto/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(auto): resolve issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"
          gh pr create \\\
            --title "fix(auto): issue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}" \\\
            --body "Closes #${{ github.event.issue.number }} Auto-generated by Gemini CLI. Review before merging." \\\
            --base main --draft --label auto-review
          gh issue comment ${{ github.event.issue.number }} \\\
            --body "Gemini opened a draft fix PR. Please review before merging."
