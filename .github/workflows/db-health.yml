name: DB health checks

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:

jobs:
  db-health:
    runs-on: [self-hosted, homelab, Linux]

    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Run identity health report
        env:
          MLB_DB_DSN: ${{ secrets.MLB_DB_DSN }}
        run: |
          if [ -z "$MLB_DB_DSN" ]; then
            echo "MLB_DB_DSN secret not set, skipping"
            exit 0
          fi
          psql "$MLB_DB_DSN" -c "SELECT stg.fn_full_identity_health_report();" || true

      - name: Check orphaned pitches
        env:
          MLB_DB_DSN: ${{ secrets.MLB_DB_DSN }}
        run: |
          if [ -z "$MLB_DB_DSN" ]; then
            echo "MLB_DB_DSN secret not set, skipping"
            exit 0
          fi
          COUNT=$(psql -t -A "$MLB_DB_DSN" -c "SELECT COUNT(*) FROM stg.fn_detect_orphaned_pitches();" 2>/dev/null || echo "0")
          echo "orphaned_pitches=$COUNT"
          if [ "$COUNT" -gt 100 ]; then
            echo "Found orphaned pitches; failing job."
            exit 1
          fi