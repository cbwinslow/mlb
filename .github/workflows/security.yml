name: "Security Scanning"

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1"  # Monday 3am UTC weekly scan
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: "Bandit — Python SAST"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install bandit
        run: pip install bandit[toml] -q

      - name: Run bandit
        run: |
          if [ -d scripts ]; then
            bandit -r scripts/ \
              -f txt \
              --severity-level medium \
              --confidence-level medium \
              -x tests/ 2>&1 || true
          else
            echo "No scripts/ directory found, skipping bandit"
          fi

  safety:
    name: "Safety — CVE Check"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install safety
        run: pip install safety -q

      - name: Run safety check
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt 2>&1 || true
          else
            echo "No requirements.txt found, skipping safety check"
          fi

  pip-audit:
    name: "pip-audit — Dependency Audit"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pip-audit -q

      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --output columns 2>&1 || true
          else
            pip-audit --output columns 2>&1 || true
          fi

  trufflehog:
    name: "TruffleHog — Secret Scan"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout (full history for secret scanning)
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --unshallow 2>/dev/null || \
          git -C "$GITHUB_WORKSPACE" fetch --depth=50 origin || true
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

  security-summary:
    name: "Security Summary"
    if: always()
    needs: [bandit, safety, pip-audit, trufflehog]
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Write summary
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///repo \
            --only-verified \
            --fail 2>&1 || true
        continue-on-error: true
