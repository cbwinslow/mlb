name: Python CI

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:

jobs:
  python-ci:
    runs-on: [self-hosted, homelab, Linux]

    steps:
      - name: Check out repository
        run: |
          git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$GITHUB_WORKSPACE" 2>/dev/null || (
            cd "$GITHUB_WORKSPACE" && git fetch --depth=1 && git reset --hard "$GITHUB_SHA"
          )
          cd "$GITHUB_WORKSPACE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        run: |
          python3 --version
          python3 -m pip install --upgrade pip --quiet

      - name: Install project
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 -m pip install . --quiet

      - name: Basic package import and CLI help
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://example:example@localhost:5432/example
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 -m compileall baseball
          baseball --help
