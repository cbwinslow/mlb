name: Python CI

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:

jobs:
  python-ci:
    runs-on: [self-hosted, homelab, linux]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Basic package import and CLI help
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://example:example@localhost:5432/example
        run: |
          python -m compileall baseball
          baseball --help
