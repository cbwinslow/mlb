name: Issue labeler

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: self-hosted
    permissions:
      issues: write

    steps:
      - name: Label issues
        uses: github/issue-labeler@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          enable-versioned-regex: 0