name: Gemini PR Review (free)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  gemini-review:
    name: Gemini CLI code review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch_depth: 0

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \\\
            --repo ${{ github.repository }} > /tmp/pr_diff.txt 2>/dev/null || \\\
              git diff origin/main...HEAD > /tmp/pr_diff.txt

      - name: Run Gemini review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(head -c 12000 /tmp/pr_diff.txt)
          gemini -p "Review this PR for the mlb PostgreSQL analytics platform. Use Gemini 2.5 Pro or the most capable model available. Flag: hardcoded secrets, raw DATABASE_URL in logs, missing workspace_id, bare except clauses, ingestion mixing source acquisition with canonical transform. Skip ruff-handled formatting. Be concise. Output markdown. DIFF: ${DIFF}" \\\
            2>&1 | tee /tmp/gemini_review.md

      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s /tmp/gemini_review.md ]; then
            printf '## Gemini Code Review\n\n' > /tmp/final.md
            cat /tmp/gemini_review.md >> /tmp/final.md
            gh pr comment ${{ github.event.pull_request.number }} \\\
              --repo ${{ github.repository }} \\\
              --body-file /tmp/final.md
          fi
