name: "Tests — Full Suite"

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      coverage-threshold:
        required: false
        type: number
        default: 75
    outputs:
      coverage-pct:
        value: ${{ jobs.pytest.outputs.coverage-pct }}
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  pytest:
    name: "pytest [${{ matrix.test-group }}] py${{ matrix.python-version }}"
    runs-on: [self-hosted, homelab, linux]
    outputs:
      coverage-pct: ${{ steps.extract-coverage.outputs.pct }}

    services: