name: "Tests - Full Suite"

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      coverage-threshold:
        required: false
        type: number
        default: 75
    outputs:
      coverage-pct:
        value: ${{ jobs.pytest.outputs.coverage-pct }}
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  pytest:
    name: "pytest [${{ matrix.test-group }}] py${{ matrix.python-version }}"
    runs-on: [self-hosted, homelab, Linux]
    strategy:
      matrix:
        test-group: [all]
        python-version:
          - ${{ inputs.python-version || '3.12' }}
    outputs:
      coverage-pct: ${{ steps.extract-coverage.outputs.pct }}
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Set up Python
        run: |
          python3 --version
          python3 -m pip install --upgrade pip --quiet

      - name: Install package and test dependencies
        run: |
          python3 -m pip install . --quiet
          python3 -m pip install pytest pytest-cov -q

      - name: Run pytest
        run: |
          python3 -m pytest tests/python/ \
            --cov=baseball \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=${{ inputs.coverage-threshold || 75 }}

      - id: extract-coverage
        name: Extract coverage percentage
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          xml_path = 'coverage.xml'
          if not os.path.exists(xml_path):
              raise SystemExit('coverage.xml not found')
          tree = ET.parse(xml_path)
          line_rate = float(tree.getroot().attrib.get('line-rate', 0))
          pct = round(line_rate * 100, 1)
          print(f"pct={pct}", file=open(os.environ['GITHUB_OUTPUT'], 'a'))
          PY
