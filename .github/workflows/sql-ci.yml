name: SQL CI

on:
  push:
    paths:
      - 'sql/**'
  pull_request:
    paths:
      - 'sql/**'

jobs:
  sql-lint:
    name: "SQL Linting"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Install sqlfluff
        run: pip install sqlfluff -q

      - name: Run sqlfluff lint
        run: |
          if [ -d sql ]; then
            sqlfluff lint sql/ \
              --dialect postgres \
              --format github-annotation \
              --annotation-level warning \
              --exclude-rules ST06,ST07 2>&1 || true
          else
            echo "No sql/ directory found, skipping"
          fi

  sql-validate:
    name: "SQL Validation"
    runs-on: [self-hosted, homelab, Linux]
    steps:
      - name: Checkout
        run: |
          git -C "$GITHUB_WORKSPACE" fetch --depth=1 origin "$GITHUB_SHA" && \
          git -C "$GITHUB_WORKSPACE" reset --hard "$GITHUB_SHA" || true

      - name: Validate SQL files parse
        run: |
          python3 <<'PY'
          import pathlib, re

          errors = []
          sql_dir = pathlib.Path('sql')
          if not sql_dir.exists():
              print("No sql/ directory found")
              exit(0)

          for f in sql_dir.rglob('*.sql'):
              content = f.read_text()
              # Basic validation - check for balanced BEGIN/COMMIT
              begin_count = len(re.findall(r'\bBEGIN\b', content, re.IGNORECASE))
              commit_count = len(re.findall(r'\bCOMMIT\b', content, re.IGNORECASE))
              if begin_count != commit_count:
                  errors.append(f'{f}: BEGIN/COMMIT mismatch ({begin_count} vs {commit_count})')

          if errors:
              for e in errors:
                  print(e)
              exit(1)
          print(f'All SQL files validated: {sum(1 for _ in sql_dir.rglob("*.sql"))} files checked')
          PY
