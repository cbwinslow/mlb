name: Aider CI Auto-Fix via OpenRouter (free top models)

onLinux,:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  aider-fix:
    name: Aider auto-fix on CI failure
    runs-on: [self-hosted, linux, homelab]
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.repository_owner == 'cbwinslow'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Install Aider
        run: |
          pip3 install aider-chat requests 2>/dev/null || true
          pip3 install -e . 2>/dev/null || true

      - name: Capture failures
        run: python3 -m pytest --tb=short -q 2>&1 | tee /tmp/test_output.txt || true

      - name: Run Aider
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then echo 'No key - skipping'; exit 0; fi
          FAILURE=$(tail -80 /tmp/test_output.txt)
          for MODEL in \
            "nvidia/nemotron-3-super-120b-a12b:free" \
            "poolside/laguna-m.1:free" \
            "openai/gpt-oss-120b:free" \
            "minimax/minimax-m2.5:free" \
            "deepseek/deepseek-v4-flash:free" \
            "openrouter/free"; do
            echo "Trying $MODEL"
            aider \
              --openai-api-key "$OPENROUTER_API_KEY" \
              --openai-api-base "https://openrouter.ai/api/v1" \
              --model "openrouter/$MODEL" \
              --message "Fix failing tests. Minimal change. No secrets or DATABASE_URL. No unrelated refactoring. Failures: $FAILURE" \
              --yes --no-git 2>&1 | tee /tmp/aider_output.txt && break || true
          done

      - name: Open draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then echo 'No changes'; exit 0; fi
          BRANCH="autofix/ci-${{ github.event.workflow_run.run_id }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(ci): auto-fix failing CI via Aider + OpenRouter"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix(ci): auto-fix CI failure (run ${{ github.event.workflow_run.run_id }})" \
            --body "Auto-generated by Aider. Failed CI: ${{ github.event.workflow_run.html_url }} Review before merging." \
            --base ${{ github.event.workflow_run.head_branch }} \
            --draft --label auto-review
