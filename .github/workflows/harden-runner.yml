name: StepSecurity Harden Runner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  harden:
    name: Harden CI runner security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            sonarcloud.io:443
            codecov.io:443
            snyk.io:443

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run security checks
        run: |
          pip install pip-audit bandit
          pip-audit --requirement requirements.txt || true
          bandit -r baseball/ -ll || true
