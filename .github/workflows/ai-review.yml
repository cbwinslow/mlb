name: "AI Code Review"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "scripts/**.py"
      - "sql/**.sql"
      - "tests/**.py"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  openrouter-review:
    name: "Gemini 2.5 Pro Review"
    runs-on: [self-hosted, homelab, Linux]
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }} 2>/dev/null || true
          git diff origin/${{ github.base_ref }}...HEAD > diff.patch 2>/dev/null || \
            git diff HEAD~1...HEAD > diff.patch
          wc -l diff.patch

      - name: AI Review via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, sys, textwrap

          diff = open('diff.patch').read()[:12000]
          pr_title = os.environ.get('PR_TITLE', 'Unknown PR')
          pr_body = os.environ.get('PR_BODY', '')[:2000]

          if not os.environ.get('OPENROUTER_API_KEY'):
              print("OPENROUTER_API_KEY not set, skipping AI review")
              with open('ai-review.md', 'w') as f:
                  f.write("## AI Review\n\n> Skipped: OPENROUTER_API_KEY secret not configured.\n")
              sys.exit(0)

          prompt = f"""You are a senior data engineer reviewing a pull request for an MLB baseball data pipeline.
          
          ## Key invariants to verify:
          - COALESCE logic must NEVER overwrite known-good player IDs with NULL or lower-quality values
          - fn_auto_resolve_statcast_player must be idempotent under concurrent inserts (no duplicates)
          - ON CONFLICT clauses must cover ALL unique constraint columns  
          - --dry-run flag must produce ZERO database writes
          - Confidence scores must always be within [0.0, 1.0]
          - GREATEST() must only increase confidence, never decrease it
          - Rate limiting must be present for all external API calls
          - Batch failures must not abort the entire run

          ## PR Context:
          Title: {pr_title}
          Description: {pr_body}

          ## Review Format:
          Structure your response with these sections:
          ### 🚨 Critical Issues (must fix before merge)
          ### ⚠️ Warnings (should fix)
          ### 🛡️ Security Notes
          ### 🧪 Test Coverage Gaps
          ### ✅ What looks good
          ### 💡 Non-blocking suggestions

          ## Diff to review:
          ```diff
          {diff}
          ```"""

          payload = json.dumps({{
              "model": "google/gemini-2.5-pro",
              "messages": [{{"role": "user", "content": prompt}}],
              "max_tokens": 4096,
          }}).encode()

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=payload,
              headers={{
                  "Authorization": f"Bearer {{os.environ['OPENROUTER_API_KEY']}}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": "https://github.com/cbwinslow/mlb",
                  "X-Title": "MLB Data Pipeline CI",
              }}
          )
          try:
              resp = json.loads(urllib.request.urlopen(req, timeout=120).read())
              review = resp["choices"][0]["message"]["content"]
              with open("ai-review.md", "w") as f:
                  f.write("## \ud83e\udd16 AI Code Review (Gemini 2.5 Pro via OpenRouter)\n\n")
                  f.write("> Automated review. Not a substitute for human review.\n\n")
                  f.write("---\n\n")
                  f.write(review)
                  f.write("\n\n---\n")
                  f.write(f"_Reviewed {len(diff.splitlines())} diff lines_")
              print("AI review complete")
          except Exception as e:
              with open("ai-review.md", "w") as f:
                  f.write(f"## AI Review\n\nFailed: {e}\n")
              print(f"AI review failed: {{e}}", file=sys.stderr)
          PYEOF

      - uses: thollander/actions-comment-pull-request@v3
        if: always() && github.event_name == 'pull_request'
        with:
          file-path: ai-review.md
          comment-tag: ai-review-gemini
          mode: recreate
