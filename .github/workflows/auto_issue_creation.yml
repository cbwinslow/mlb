name: Auto-Create Issues from PR Reviews

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  create-issues-from-review:
    name: Parse and create GitHub issues
    runs-on: [self-hosted, homelab, linux]
    # Only run when a review has comments (changes_requested or comment)
    if: |
      github.event_name == 'pull_request_review' &&
      (github.event.review.state == 'changes_requested' ||
       github.event.review.state == 'commented')
    steps:
      - name: Create GitHub issues from review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_ID: ${{ github.event.review.id }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -euo pipefail
          KEYWORDS="bug error issue problem fail incorrect missing security secret credential database_url critical vulnerability injection unsafe broken hardcoded exposed leak"

          contains_keyword() {
            local text=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            for kw in $KEYWORDS; do
              echo "$text" | grep -q "$kw" && return 0
            done
            return 1
          }

          create_issue_and_comment() {
            local title="$1"
            local body="$2"
            local issue_url
            issue_url=$(echo "$body" | gh api repos/${REPO}/issues \
              --method POST \
              --field title="$title" \
              --field body=@- \
              --field labels[]="bug" \
              --field labels[]="auto-review" \
              --jq '.html_url')
            echo "Created issue: $issue_url"
            gh api repos/${REPO}/issues/${PR_NUMBER}/comments \
              --method POST \
              --field body="Bug Auto-issue created: ${issue_url}" > /dev/null
          }

          # Check top-level review body
          if [ -n "${REVIEW_BODY:-}" ] && contains_keyword "$REVIEW_BODY"; then
            SHORT=$(echo "$REVIEW_BODY" | head -c 72 | tr '\n' ' ')
            ISSUE_BODY=$(printf '## Source\n\nAuto-created from PR #%s: [%s](%s)\nReview by @%s\n\n---\n\n## Review Comment\n\n%s\n\n---\n\n## AI-Agent Fix Prompt\n\n```\nFix the following issue found during code review:\n\n%s\n```' \
              "$PR_NUMBER" "$PR_TITLE" "$PR_URL" "$REVIEWER" "$REVIEW_BODY" "$REVIEW_BODY")
            create_issue_and_comment "[auto] ${SHORT}" "$ISSUE_BODY"
          fi

          # Check inline review comments via API
          gh api repos/${REPO}/pulls/${PR_NUMBER}/comments --paginate \
            | jq -r --arg rid "$REVIEW_ID" \
              '.[] | select(.pull_request_review_id == ($rid | tonumber)) | [.body, .path, (.original_line // .line // 0 | tostring)] | @tsv' \
          | while IFS=$'\t' read -r body path line; do
              if contains_keyword "$body"; then
                SHORT=$(echo "$body" | head -c 72 | tr '\n' ' ')
                LOCATION="File: \`${path}\`${line:+" (line $line)"}"
                ISSUE_BODY=$(printf '## Source\n\nAuto-created from PR #%s: [%s](%s)\nReview by @%s\n\n---\n\n## Location\n\n%s\n\n## Review Comment\n\n%s\n\n---\n\n## AI-Agent Fix Prompt\n\n```\nFix the following issue in %s:\n\n%s\n```' \
                  "$PR_NUMBER" "$PR_TITLE" "$PR_URL" "$REVIEWER" \
                  "$LOCATION" "$body" "$path" "$body")
                create_issue_and_comment "[auto] ${path}: ${SHORT}" "$ISSUE_BODY"
              fi
            done

  create-issue-on-demand:
    name: Create issue on @mlb-bot mention
    runs-on: [self-hosted, homelab, Linux]
    # Trigger when someone comments "@mlb-bot create issue" on a PR
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@mlb-bot create issue')
    steps:
      - name: Parse comment and create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          DESCRIPTION=$(echo "$COMMENT_BODY" | sed 's/@mlb-bot create issue//i' | xargs)

          if [ -z "$DESCRIPTION" ]; then
            gh api repos/${REPO}/issues/${ISSUE_NUMBER}/comments \
              --method POST \
              --field body='Warning @mlb-bot needs a description after `create issue`. Example: `@mlb-bot create issue The ingestion worker crashes when source file is missing`'
            exit 0
          fi

          SHORT=$(echo "$DESCRIPTION" | head -c 80 | tr '\n' ' ')
          ISSUE_BODY=$(printf '## Source\n\nCreated on-demand by @%s on #%s: [%s](%s)\n\n## Description\n\n%s\n\n## AI-Agent Fix Prompt\n\n```\nFix the following issue in the mlb repo:\n\n%s\n\nConsult the codebase context and the postgres MCP tool for schema details.\n```' \
            "$AUTHOR" "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_URL" \
            "$DESCRIPTION" "$DESCRIPTION")

          NEW_ISSUE_URL=$(echo "$ISSUE_BODY" | gh api repos/${REPO}/issues \
            --method POST \
            --field title="[auto] ${SHORT}" \
            --field body=@- \
            --field labels[]="bug" \
            --field labels[]="auto-review" \
            --jq '.html_url')

          gh api repos/${REPO}/issues/${ISSUE_NUMBER}/comments \
            --method POST \
            --field body="Issue created: ${NEW_ISSUE_URL}"
