name: Auto-Create Issues from PR Reviews

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  create-issues-from-review:
    name: Parse review and create GitHub issues
    runs-on: [self-hosted, homelab, linux]
    # Only run when a review has comments (changes_requested or comment)
    if: |
      github.event_name == 'pull_request_review' &&
      (github.event.review.state == 'changes_requested' ||
       github.event.review.state == 'commented')
    steps:
      - name: Create GitHub issues from review comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reviewBody = context.payload.review.body || '';
            const reviewer   = context.payload.review.user.login;
            const prNumber   = context.payload.pull_request.number;
            const prTitle    = context.payload.pull_request.title;
            const prUrl      = context.payload.pull_request.html_url;

            // Pull all review comments for this PR review
            const { data: comments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: prNumber,
            });

            // Filter to comments from this specific review
            const reviewId = context.payload.review.id;
            const reviewComments = comments.filter(c => c.pull_request_review_id === reviewId);

            const bugs      = [];
            const KEYWORDS  = [
              'bug', 'error', 'issue', 'problem', 'fail', 'incorrect',
              'missing', 'security', 'secret', 'credential', 'database_url',
              'critical', 'vulnerability', 'injection', 'unsafe', 'broken',
              'hardcoded', 'exposed', 'leak'
            ];

            // Check top-level review body
            if (reviewBody) {
              const lower = reviewBody.toLowerCase();
              if (KEYWORDS.some(k => lower.includes(k))) {
                bugs.push({
                  body: reviewBody,
                  path: null,
                  line: null
                });
              }
            }

            // Check each inline review comment
            for (const c of reviewComments) {
              const lower = c.body.toLowerCase();
              if (KEYWORDS.some(k => lower.includes(k))) {
                bugs.push({
                  body: c.body,
                  path: c.path,
                  line: c.original_line || c.line
                });
              }
            }

            if (bugs.length === 0) {
              console.log('No actionable review comments found.');
              return;
            }

            for (const bug of bugs) {
              const location = bug.path
                ? `**File:** \`${bug.path}\`${bug.line ? ` (line ${bug.line})` : ''}`
                : '_Top-level review comment_';

              const issueBody = [
                `## Source`,
                ``,
                `Automatically created from PR #${prNumber}: [${prTitle}](${prUrl})`,
                `Review by @${reviewer}`,
                ``,
                `---`,
                ``,
                `## Location`,
                ``,
                location,
                ``,
                `## Review Comment`,
                ``,
                bug.body,
                ``,
                `---`,
                ``,
                `## Suggested Fix`,
                ``,
                `> _Paste suggested fix or ask an AI agent (Cursor, Kilo, Claude Code) to implement the fix using this issue as context._`,
                ``,
                `**Prompt for AI agent:**`,
                `\`\`\``,
                `Fix the following issue found during code review of ${bug.path || 'the codebase'}:`,
                ``,
                bug.body,
                `\`\`\``,
              ].join('\n');

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: `[auto] ${bug.path ? bug.path + ': ' : ''}${bug.body.slice(0, 72).replace(/\n/g, ' ')}${bug.body.length > 72 ? '…' : ''}`,
                body:  issueBody,
                labels: ['bug', 'auto-review'],
              });

              console.log(`Created issue #${issue.number}: ${issue.html_url}`);

              // Comment back on the PR linking to the issue
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body: `🐛 **Auto-issue created:** [#${issue.number} — ${issue.title}](${issue.html_url})\n\nThis issue was automatically generated from a review comment and includes an AI-agent-ready prompt for fixing it.`,
              });
            }

  create-issue-on-demand:
    name: Create issue on @mlb-bot mention
    runs-on: [self-hosted, homelab, linux]
    # Trigger when someone comments "@mlb-bot create issue" on a PR
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@mlb-bot create issue')
    steps:
      - name: Create issue from comment body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment  = context.payload.comment.body;
            const author   = context.payload.comment.user.login;
            const issueNum = context.payload.issue.number;
            const issueTitle = context.payload.issue.title;
            const issueUrl   = context.payload.issue.html_url;

            // Strip the trigger phrase and use the rest as the description
            const description = comment
              .replace(/@mlb-bot create issue/i, '')
              .trim();

            if (!description) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNum,
                body: '⚠️ @mlb-bot needs a description after `create issue`. Example:\n```\n@mlb-bot create issue The ingestion worker crashes when source file is missing\n```',
              });
              return;
            }

            const body = [
              `## Source`,
              ``,
              `Created on-demand from comment by @${author} on #${issueNum}: [${issueTitle}](${issueUrl})`,
              ``,
              `## Description`,
              ``,
              description,
              ``,
              `## AI-Agent Fix Prompt`,
              ``,
              `\`\`\``,
              `Fix the following issue in the mlb repo:`,
              ``,
              description,
              ``,
              `Consult the codebase context and the postgres MCP tool for schema details.`,
              `\`\`\``,
            ].join('\n');

            const shortTitle = description.slice(0, 80).replace(/\n/g, ' ') + (description.length > 80 ? '…' : '');

            const { data: newIssue } = await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `[auto] ${shortTitle}`,
              body:   body,
              labels: ['bug', 'auto-review'],
            });

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNum,
              body: `✅ Issue created: [#${newIssue.number}](${newIssue.html_url})`,
            });
