name: Feature request

description: Suggest an enhancement or new feature

labels:
  - type:feature

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. This can cover SQL, Python, ingestion, modeling, or operations.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this feature solve? Why is it important?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have an idea of how to implement it, describe it here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you have considered.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
