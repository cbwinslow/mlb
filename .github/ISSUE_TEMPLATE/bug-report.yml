name: Bug report

description: Report a bug in the MLB analytics platform

labels:
  - type:bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please provide as much detail as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: APP_ENV, database version, and any relevant details.
      placeholder: e.g. APP_ENV=local, Postgres 16, macOS

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
