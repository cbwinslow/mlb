# SonarCloud project configuration
# https://sonarcloud.io/project/configuration?id=cbwinslow_mlb

sonar.projectKey=cbwinslow_mlb
sonar.organization=cbwinslow

# Project metadata
sonar.projectName=MLB Baseball Analytics Platform
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=baseball,scripts,sql
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python-specific settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclusions - skip migrations, cache, and generated files
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/migrations/**,.github/**
sonar.coverage.exclusions=tests/**,scripts/**,**/__pycache__/**

# SQL analysis
sonar.sql.dialect=postgresql

# Encoding
sonar.sourceEncoding=UTF-8
